<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台幣轉人民幣報價</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-slate-100">

        <h1 class="text-2xl font-black mb-2 text-slate-800 flex items-center gap-2">
            <span class="bg-blue-600 text-white px-2 py-1 rounded">TWD</span>
            <span class="text-slate-400">➔</span>
            <span class="bg-red-500 text-white px-2 py-1 rounded">CNY</span>
            <span class="text-base font-semibold text-slate-500 ml-1">報價試算</span>
        </h1>

        <!-- 匯率顯示 -->
        <div class="flex items-center gap-3 mb-6 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
            <div>
                <p class="text-xs text-slate-400 font-medium">即時匯率 (1 CNY = ? TWD)</p>
                <p id="rate-display" class="text-2xl font-mono font-bold text-blue-600">載入中...</p>
                <p id="time-display" class="text-[10px] text-slate-400 italic mt-0.5"></p>
            </div>
            <div class="ml-auto text-right">
                <span id="rate-dot" class="inline-block w-2 h-2 rounded-full bg-slate-300 mr-1"></span>
                <span id="rate-status" class="text-xs text-slate-400">--</span>
            </div>
        </div>

        <div class="space-y-5">

            <!-- 台幣輸入 -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">輸入台幣金額 (TWD)</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">NT$</span>
                    <input type="number" id="input-price" min="0" step="1"
                        class="w-full pl-12 pr-4 py-3 text-lg border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none transition-all"
                        placeholder="請輸入金額">
                </div>
            </div>

            <!-- 收費方式選擇 -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">收費方式</label>
                <div class="grid grid-cols-2 gap-3">
                    <label id="label-atm"
                        class="flex flex-col items-center gap-1 border-2 border-blue-500 bg-blue-50 rounded-xl p-3 cursor-pointer transition-all">
                        <input type="radio" name="payment" value="atm" class="sr-only" checked>
                        <span class="text-2xl">🏧</span>
                        <span class="font-bold text-slate-700 text-sm">ATM 轉帳</span>
                        <span class="text-xs text-slate-500">手續費 1.05%，最低 $15</span>
                    </label>
                    <label id="label-store"
                        class="flex flex-col items-center gap-1 border-2 border-slate-200 bg-slate-50 rounded-xl p-3 cursor-pointer transition-all">
                        <input type="radio" name="payment" value="store" class="sr-only">
                        <span class="text-2xl">🏪</span>
                        <span class="font-bold text-slate-700 text-sm">超商繳費</span>
                        <span class="text-xs text-slate-500">手續費固定 $17</span>
                    </label>
                </div>
            </div>

            <!-- 明細區塊 -->
            <div id="breakdown" class="hidden bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-2 text-sm">
                <p class="font-bold text-slate-600 text-xs uppercase tracking-wider mb-2">計算明細</p>

                <div class="flex justify-between text-slate-600">
                    <span>輸入台幣金額</span>
                    <span id="bd-input" class="font-mono">--</span>
                </div>
                <div class="flex justify-between text-slate-600">
                    <span id="bd-fee-label">手續費</span>
                    <span id="bd-fee" class="font-mono text-orange-600">--</span>
                </div>
                <div class="flex justify-between text-slate-700 font-semibold border-t border-slate-200 pt-2">
                    <span>合計台幣（無條件捨去）</span>
                    <span id="bd-total-twd" class="font-mono">--</span>
                </div>
                <div class="flex justify-between text-slate-600">
                    <span>÷ 匯率（<span id="bd-rate-val">--</span>）</span>
                    <span id="bd-cny-raw" class="font-mono">--</span>
                </div>
                <div class="flex justify-between text-slate-600">
                    <span>扣除 6.5% 差價</span>
                    <span id="bd-deduct" class="font-mono text-red-400">--</span>
                </div>
            </div>

            <!-- 結果 -->
            <div class="pt-4 border-t-2 border-dashed border-slate-200">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">報價結果（人民幣）</label>
                <div id="result" class="text-5xl font-black text-red-500 tracking-tight">
                    ¥ --
                </div>
                <p class="text-[10px] text-slate-400 mt-2 italic">無條件捨去至小數點第二位</p>
            </div>

        </div>
    </div>

    <script>
        let currentRate = 0;

        async function init() {
            try {
                const res = await fetch(`rate.json?t=${Date.now()}`);
                const data = await res.json();
                if (data.rate) {
                    currentRate = data.rate;
                    document.getElementById('rate-display').innerText = currentRate.toFixed(4);
                    document.getElementById('time-display').innerText = '更新時間：' + data.time;
                    document.getElementById('rate-dot').className = 'inline-block w-2 h-2 rounded-full bg-green-400 mr-1';
                    document.getElementById('rate-status').innerText = '即時';
                }
            } catch {
                document.getElementById('rate-display').innerText = '讀取失敗';
                document.getElementById('rate-dot').className = 'inline-block w-2 h-2 rounded-full bg-red-400 mr-1';
                document.getElementById('rate-status').innerText = '離線';
            }
        }

        function getFee(twd, method) {
            if (method === 'atm') {
                return Math.max(Math.ceil(twd * 0.0105 * 100) / 100, 15);
            }
            return 17;
        }

        function calculate() {
            const raw = parseFloat(document.getElementById('input-price').value);
            const method = document.querySelector('input[name="payment"]:checked').value;
            const breakdown = document.getElementById('breakdown');

            if (!raw || raw <= 0 || currentRate <= 0) {
                document.getElementById('result').innerText = '¥ --';
                breakdown.classList.add('hidden');
                return;
            }

            const fee = getFee(raw, method);
            const totalTwd = Math.floor(raw + fee);
            const cnyRaw = totalTwd / currentRate;
            const cnyAfterDeduct = cnyRaw * (1 - 0.065);
            const finalCny = Math.floor(cnyAfterDeduct * 100) / 100;
            const deductAmt = cnyRaw - cnyAfterDeduct;

            // 更新明細
            document.getElementById('bd-input').innerText = `NT$ ${raw.toLocaleString('zh-TW', {minimumFractionDigits: 0})}`;

            const feeLabel = method === 'atm'
                ? `ATM 手續費（1.05%，最低$15）`
                : `超商手續費（固定）`;
            document.getElementById('bd-fee-label').innerText = feeLabel;
            document.getElementById('bd-fee').innerText = `+ NT$ ${fee.toFixed(2)}`;

            document.getElementById('bd-total-twd').innerText = `NT$ ${totalTwd.toLocaleString()}`;
            document.getElementById('bd-rate-val').innerText = currentRate.toFixed(4);
            document.getElementById('bd-cny-raw').innerText = `≈ ¥ ${cnyRaw.toFixed(4)}`;
            document.getElementById('bd-deduct').innerText = `- ¥ ${deductAmt.toFixed(4)}`;

            breakdown.classList.remove('hidden');
            document.getElementById('result').innerText = `¥ ${finalCny.toFixed(2)}`;
        }

        // 收費方式切換樣式
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.getElementById('label-atm').className =
                    'flex flex-col items-center gap-1 border-2 rounded-xl p-3 cursor-pointer transition-all ' +
                    (document.querySelector('input[value="atm"]').checked
                        ? 'border-blue-500 bg-blue-50'
                        : 'border-slate-200 bg-slate-50');
                document.getElementById('label-store').className =
                    'flex flex-col items-center gap-1 border-2 rounded-xl p-3 cursor-pointer transition-all ' +
                    (document.querySelector('input[value="store"]').checked
                        ? 'border-blue-500 bg-blue-50'
                        : 'border-slate-200 bg-slate-50');
                calculate();
            });
        });

        document.getElementById('input-price').addEventListener('input', calculate);
        init();
    </script>
</body>
</html>
