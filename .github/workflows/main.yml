name: Update Exchange Rate

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write # 強制給予寫入權限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run scraper
        run: python update_rate.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rate.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update rate" && git push)
